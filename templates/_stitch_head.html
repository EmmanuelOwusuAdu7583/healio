<style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .chart-container {
            height: 200px;
            position: relative;
        }
        .active-nav-item {
            transition: transform 0.15s ease-in-out;
        }
        .active-nav-item:active {
            transform: scale(0.98);
        }
        .btn-bounce {
            transition: transform 0.2s;
        }
        .btn-bounce:active {
            transform: scale(0.95);
        }
        .timeline-line {
            background: linear-gradient(to bottom, transparent, #cbd5e1 15%, #cbd5e1 85%, transparent);
        }
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 16px;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e0e3e5;
            border-radius: 10px;
        }
        .line-graph-svg {
            filter: drop-shadow(0px 4px 4px rgba(0, 61, 155, 0.2));
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .star-active {
            font-variation-settings: 'FILL' 1;
            color: #0052cc;
        }
        .bento-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .bento-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }
        input:checked + .toggle-dot {
            transform: translateX(100%);
            background-color: #ffffff;
        }
        input:checked + .toggle-bg {
            background-color: #0052cc;
        }
        .clinical-gradient {
            background: linear-gradient(135deg, #0052cc 0%, #003d9b 100%);
        }
        .soft-elevation {
            box-shadow: 0 4px 20px -2px rgba(0, 61, 155, 0.05);
        }
        .login-card-backdrop {
            backdrop-filter: blur(8px);
            background: rgba(255, 255, 255, 0.95);
        }
        .input-focus-ring:focus-within {
            border-color: #0052cc;
            box-shadow: 0 0 0 2px rgba(0, 82, 204, 0.1);
        }
        /* Star rating: radio inputs in DOM order 5..1, row-reverse displays 1..5
           left-to-right while the ~ combinator still fills toward the left. */
        .hstar-rating {
            display: flex;
            flex-direction: row-reverse;
            justify-content: flex-end;
            gap: 4px;
        }
        .hstar-rating input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }
        .hstar-rating label {
            font-family: 'Material Symbols Outlined';
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            font-size: 30px;
            line-height: 1;
            cursor: pointer;
            color: #737685;
            transition: transform 0.15s, color 0.15s;
        }
        .hstar-rating label:active {
            transform: scale(0.9);
        }
        .hstar-rating label::before {
            content: 'star';
        }
        .hstar-rating input:checked ~ label,
        .hstar-rating label:hover,
        .hstar-rating label:hover ~ label {
            color: #0052cc;
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Medication adherence toggle */
        .htoggle-switch {
            position: relative;
            display: inline-flex;
            align-items: center;
            cursor: pointer;
        }
        .htoggle-switch input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }
        .htoggle-bg {
            width: 44px;
            height: 24px;
            background: #c3c6d6;
            border-radius: 9999px;
            transition: background-color 0.15s;
        }
        .htoggle-switch input:checked + .htoggle-bg {
            background-color: #0052cc;
        }
        .htoggle-dot {
            position: absolute;
            left: 2px;
            top: 2px;
            width: 20px;
            height: 20px;
            background: #ffffff;
            border: 1px solid #c3c6d6;
            border-radius: 9999px;
            transition: transform 0.15s;
        }
        .htoggle-switch input:checked ~ .htoggle-dot {
            transform: translateX(100%);
        }
    </style>
